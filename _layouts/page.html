---
layout: default
---

<article class="max-w-4xl mx-auto">
  <header class="mb-10">
    <h1 class="text-3xl font-bold mb-3 text-gray-900 dark:text-gray-100 tracking-tight">{{ page.title }}</h1>
    {% if page.description %}
    <p class="text-base text-gray-500 dark:text-gray-400 leading-relaxed">{{ page.description }}</p>
    {% endif %}
  </header>

  <div>
    {{ content }}
  </div>
</article>
